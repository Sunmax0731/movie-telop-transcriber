<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">movie-telop-transcriber overview</title>
  <desc id="desc">Windows GUI application overview showing install flow, OCR pipeline, review UI, outputs, and traceability features.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4efe5" />
      <stop offset="100%" stop-color="#e5edf5" />
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#17406d" />
      <stop offset="100%" stop-color="#297c74" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1b3550" flood-opacity="0.14" />
    </filter>
    <style>
      text { font-family: "Segoe UI", "Yu Gothic UI", sans-serif; fill: #153047; }
      .small { font-size: 20px; }
      .body { font-size: 24px; }
      .label { font-size: 22px; font-weight: 700; }
      .title { font-size: 50px; font-weight: 700; fill: #ffffff; }
      .subtitle { font-size: 24px; fill: #dce9f5; }
      .card { fill: #ffffff; stroke: #d4dde7; stroke-width: 2; rx: 28; }
      .badge { fill: #e9f4ef; stroke: #8db5a2; stroke-width: 2; rx: 18; }
      .badge-blue { fill: #edf4fb; stroke: #97b7d6; stroke-width: 2; rx: 18; }
      .pill { fill: #163f6d; }
      .pill-text { font-size: 18px; font-weight: 700; fill: #ffffff; }
      .muted { fill: #5f7285; }
      .accent { fill: #1c6b64; }
      .arrow { stroke: #2f6178; stroke-width: 4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#2f6178" />
    </marker>
  </defs>

  <rect width="1400" height="900" fill="url(#bg)" />
  <rect x="38" y="34" width="1324" height="168" rx="34" fill="url(#hero)" filter="url(#shadow)" />
  <text x="82" y="103" class="title">movie-telop-transcriber</text>
  <text x="82" y="145" class="subtitle">Windows GUI で動画テロップを OCR し、時刻・位置・出力・検証記録まで追跡できるワークベンチ</text>

  <rect x="82" y="162" width="170" height="32" class="pill" rx="16" />
  <text x="104" y="183" class="pill-text">WinUI 3</text>
  <rect x="268" y="162" width="182" height="32" class="pill" rx="16" />
  <text x="290" y="183" class="pill-text">PaddleOCR PP-OCRv5</text>
  <rect x="466" y="162" width="168" height="32" class="pill" rx="16" />
  <text x="488" y="183" class="pill-text">Project Save / Reload</text>
  <rect x="650" y="162" width="182" height="32" class="pill" rx="16" />
  <text x="672" y="183" class="pill-text">SRT / VTT / ASS / CSV</text>

  <g transform="translate(58 240)">
    <rect x="0" y="0" width="300" height="262" class="card" filter="url(#shadow)" />
    <text x="28" y="42" class="label">1. 導入と起動</text>
    <rect x="28" y="62" width="244" height="44" class="badge-blue" />
    <text x="46" y="90" class="body">Release zip + installer</text>
    <text x="28" y="138" class="small">• START_HERE から導入手順へ入る</text>
    <text x="28" y="174" class="small">• OCR runtime readiness を自動確認</text>
    <text x="28" y="210" class="small">• 標準配布は .NET + Python 前提</text>
    <text x="28" y="238" class="small muted">self-contained publish は既知制約として分離</text>
  </g>

  <g transform="translate(392 240)">
    <rect x="0" y="0" width="616" height="262" class="card" filter="url(#shadow)" />
    <text x="28" y="42" class="label">2. 解析フロー</text>
    <rect x="28" y="78" width="122" height="120" class="badge" />
    <text x="46" y="114" class="label">入力動画</text>
    <text x="46" y="150" class="small">mp4 / 実動画</text>
    <text x="46" y="178" class="small">出力先を指定</text>

    <rect x="178" y="78" width="122" height="120" class="badge" />
    <text x="196" y="114" class="label">フレーム抽出</text>
    <text x="196" y="150" class="small">間隔調整</text>
    <text x="196" y="178" class="small">run ごとに保存</text>

    <rect x="328" y="78" width="122" height="120" class="badge" />
    <text x="354" y="114" class="label">OCR</text>
    <text x="348" y="150" class="small">PaddleOCR</text>
    <text x="348" y="178" class="small">bbox / confidence</text>

    <rect x="478" y="78" width="110" height="120" class="badge" />
    <text x="494" y="114" class="label">統合</text>
    <text x="494" y="150" class="small">セグメント化</text>
    <text x="494" y="178" class="small">時刻追跡</text>

    <path d="M150 138 L178 138" class="arrow" marker-end="url(#arrowhead)" />
    <path d="M300 138 L328 138" class="arrow" marker-end="url(#arrowhead)" />
    <path d="M450 138 L478 138" class="arrow" marker-end="url(#arrowhead)" />

    <text x="28" y="232" class="small muted">各 run は frames / ocr / output / logs を残し、後から再評価可能</text>
  </g>

  <g transform="translate(1042 240)">
    <rect x="0" y="0" width="300" height="262" class="card" filter="url(#shadow)" />
    <text x="28" y="42" class="label">3. 出力</text>
    <rect x="28" y="64" width="108" height="42" class="badge-blue" />
    <text x="50" y="91" class="body">JSON</text>
    <rect x="148" y="64" width="108" height="42" class="badge-blue" />
    <text x="178" y="91" class="body">CSV</text>
    <rect x="28" y="118" width="108" height="42" class="badge-blue" />
    <text x="62" y="145" class="body">SRT</text>
    <rect x="148" y="118" width="108" height="42" class="badge-blue" />
    <text x="180" y="145" class="body">VTT</text>
    <rect x="28" y="172" width="108" height="42" class="badge-blue" />
    <text x="62" y="199" class="body">ASS</text>
    <text x="28" y="242" class="small muted">字幕ファイルと構造化データを両立</text>
  </g>

  <g transform="translate(58 540)">
    <rect x="0" y="0" width="428" height="288" class="card" filter="url(#shadow)" />
    <text x="28" y="42" class="label">4. GUI で確認・編集</text>
    <rect x="28" y="64" width="372" height="188" fill="#f7fafc" stroke="#d7e0e9" stroke-width="2" rx="18" />
    <rect x="48" y="86" width="118" height="76" fill="#dce9f5" stroke="#97b7d6" stroke-width="2" rx="12" />
    <text x="64" y="116" class="small">プレビュー</text>
    <text x="64" y="144" class="small">bbox 強調</text>
    <rect x="184" y="86" width="194" height="28" fill="#e6f3ef" stroke="#8db5a2" stroke-width="2" rx="10" />
    <rect x="184" y="124" width="194" height="28" fill="#edf4fb" stroke="#97b7d6" stroke-width="2" rx="10" />
    <rect x="184" y="162" width="194" height="28" fill="#f7ecd9" stroke="#d7b780" stroke-width="2" rx="10" />
    <text x="198" y="104" class="small">タイムラインと選択同期</text>
    <text x="198" y="142" class="small">テキスト編集 / 削除 / コピー</text>
    <text x="198" y="180" class="small">位置・時刻・結果を横断確認</text>
    <text x="28" y="274" class="small muted">プロジェクト保存で後日同じ状態を再表示できる</text>
  </g>

  <g transform="translate(520 540)">
    <rect x="0" y="0" width="398" height="288" class="card" filter="url(#shadow)" />
    <text x="28" y="42" class="label">5. 中間成果物と検証</text>
    <text x="28" y="84" class="small">• work/runs/&lt;run_id&gt;/ に成果物を保存</text>
    <text x="28" y="118" class="small">• summary.json / run.log で失敗原因を追跡</text>
    <text x="28" y="152" class="small">• QCDS canonical と release smoke を維持</text>
    <text x="28" y="186" class="small">• synthetic / real-video-equivalent の両系統で評価</text>
    <rect x="28" y="210" width="340" height="46" class="badge" />
    <text x="48" y="239" class="body">build → test → package → install → readiness</text>
    <text x="28" y="274" class="small muted">配布後も「再現できる状態」を重視した構成</text>
  </g>

  <g transform="translate(952 540)">
    <rect x="0" y="0" width="390" height="288" class="card" filter="url(#shadow)" />
    <text x="28" y="42" class="label">6. 現在の位置づけ</text>
    <rect x="28" y="66" width="146" height="40" class="badge-blue" />
    <text x="54" y="92" class="body">QCDS: A-</text>
    <rect x="192" y="66" width="160" height="40" class="badge-blue" />
    <text x="218" y="92" class="body">成果物: A</text>
    <text x="28" y="136" class="small">強み:</text>
    <text x="28" y="166" class="small">• 日本語テロップ OCR の追跡性</text>
    <text x="28" y="196" class="small">• 配布・導入・検証ドキュメントの厚み</text>
    <text x="28" y="226" class="small">• README / short guide / START_HERE の導線</text>
    <text x="28" y="262" class="small accent">残課題: self-contained 未成立、OCR runtime 外部依存</text>
  </g>
</svg>
